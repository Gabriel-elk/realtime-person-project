
services:
  broker:
    image: apache/kafka:3.9.0  # Ajuste: imagem bitnami/kafka removida do Docker Hub, substituída pela imagem oficial Apache
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://broker:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://broker:9092" #listener interno do broker do kafka para conecções de rede interna
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"  # Ajuste: variável renomeada (era KAFKA_CFG_CONTROLLER_LISTENER_NAMES na imagem Bitnami)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "networkproject-kafka-cluster-01"  # Ajuste: obrigatório na imagem Apache Kafka para modo KRaft
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 20s
      timeout: 15s
      retries: 5
    networks:
    - networkproject

  webserver:
    image: apache/airflow:2.10.4-python3.11
    command: ["bash", "-c", "/opt/airflow/script/entrypoint.sh"]
    depends_on:
    - postgres
    environment:
      - LOAD_EX=n
      - EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=security_key
    logging:
      options:
        max-size: 10m
        max-file: "3"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./entrypoint/entrypoint.sh:/opt/airflow/script/entrypoint.sh
      - ./requirements.txt:/opt/airflow/requirements.txt
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD-SHELL', "[ -f /opt/airflow/airflow-webserver.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - networkproject

  scheduler:
    image: apache/airflow:2.10.4-python3.11
    depends_on:
      webserver:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./entrypoint/entrypoint.sh:/opt/airflow/script/entrypoint.sh
      - ./requirements.txt:/opt/airflow/requirements.txt
    environment:
      - LOAD_EX=n
      - EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=security_key
    command: bash -c "pip install -r ./requirements.txt && airflow db upgrade && airflow scheduler"
    networks:
      - networkproject
    
  postgres:
    image: postgres:14.0
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - networkproject

  spark-master:
    image: apache/spark:3.5.4  # Ajuste: imagem bitnami/spark removida do Docker Hub, substituída pela imagem oficial Apache
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master  # Ajuste: path absoluto /opt/spark/bin/ (era bin/ na imagem Bitnami)
    ports:
      - "9091:8080"
      - "7077:7077"
    networks:
      - networkproject

  spark-worker-1:
    image: apache/spark:3.5.4  # Ajuste: imagem bitnami/spark removida do Docker Hub, substituída pela imagem oficial Apache
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077  # Ajuste: path absoluto /opt/spark/bin/ (era bin/ na imagem Bitnami)
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 1g
      SPARK_MASTER_URL: spark://spark-master:7077
    networks:
      - networkproject

  cassandra_db:
    image: cassandra:5.0.2
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_USERNAME=cassandra
      - CASSANDRA_PASSWORD=cassandra
      - LOCAL_JMX=no
    volumes:
    - ./cassandra/jvm-server.options:/etc/cassandra/jvm-server.options
    - ./cassandra/cassandra-env.sh:/etc/cassandra/cassandra-env.sh
    networks:
      - networkproject
  cassandra-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: cassandra-exporter
    ports:
      - "8081:8081"
    volumes:
      - ./cassandra-exporter/config.yml:/opt/bitnami/jmx-exporter/conf/config.yml
    command:
      - "8081"
      - "/opt/bitnami/jmx-exporter/conf/config.yml"
    environment:
      JVM_OPTS: >-
        -Dcom.sun.jndi.rmiURLParsing=legacy
        -Djava.rmi.server.hostname=cassandra
    depends_on:
      - cassandra_db
    networks:
      - networkproject
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - cassandra_db
    networks:
      - networkproject
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana-storage:/var/lib/grafana
      - ./grafana-plugins:/var/lib/grafana/plugins
    networks:
      - networkproject 
    depends_on:
      - cassandra_db

networks:
  networkproject:
  




    